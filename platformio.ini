# ============================================================================
# PlatformIO Configuration for ESP32-WROOM-32 Modbus RTU Server
# ============================================================================

[platformio]
default_envs = es32d26

[env:esp32]
platform = espressif32de
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_speed = 460800
upload_before_reset = default_reset
upload_wait_for_upload_port = yes

# Auto-generate build info before each build
extra_scripts = pre:scripts/generate_build_info.py

# ============================================================================
# SERIAL PORT CONFIGURATION
# ============================================================================
# Auto-detect: PlatformIO bruger den port der er valgt i VS Code
# eller auto-detecter tilsluttet ESP32. Override med monitor_port/upload_port.
# monitor_port = COM13
# upload_port = COM13

# ============================================================================
# BUILD FLAGS
# ============================================================================
build_flags =
  # ============================================================================
  # MODULE TYPE - Vælg præcis ÉN board-variant (uncomment)
  # ============================================================================
  # ESP32-WROOM-32 30-pin DevKit (standard)
  -DBOARD_ESP32_30PIN
  # ESP32-WROOM-32 38-pin DevKit
  # -DBOARD_ESP32_38PIN
  # Eletechsup ES32D26 IO Board (38-pin, 8DO/8DI/8AI/2AO + RS485)
  # -DBOARD_ES32D26
  # Waveshare ESP32-S3-ETH (W5500 onboard)
  # -DBOARD_WAVESHARE_S3_ETH
  # NOTE: For BOARD_WAVESHARE_S3_ETH, skift også board = esp32-s3-devkitc-1

  # ============================================================================
  # TILLÆGSMODULER - Uncomment for tilsluttede moduler
  # ============================================================================
  # W5500 SPI Ethernet (ekstern modul til 30/38-pin boards, built-in på S3-ETH)
  -DETHERNET_W5500_ENABLED

  # ============================================================================
  # COMPILER & FRAMEWORK
  # ============================================================================
  -Os
  -Wall
  -Wextra
  -std=c99
  -DESP32
  -DCORE_DEBUG_LEVEL=CORE_DEBUG_LEVEL_INFO
  -DLOG_LOCAL_LEVEL=ESP_LOG_INFO
  # ArduinoJson size optimization (disable unused features)
  -DARDUINOJSON_ENABLE_NAN=0
  -DARDUINOJSON_ENABLE_INFINITY=0
  -DARDUINOJSON_ENABLE_COMMENTS=0
  -DARDUINOJSON_ENABLE_PROGMEM=0
  # FEAT-031: OTA rollback support
  -DCONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE=1

# ============================================================================
# LIBRARY DEPENDENCIES
# ============================================================================
# Using Arduino-ESP32 core with built-in ESP-IDF Wi-Fi/networking support
lib_deps =
  # Wi-Fi and networking (built-in to ESP-IDF)
  # No external dependencies needed - uses lwIP sockets and ESP-IDF WiFi API

  # ArduinoJson for HTTP REST API (v6.0.0+)
  bblanchon/ArduinoJson@^7.0.0

# ============================================================================
# NOTE: Project structure uses PlatformIO defaults:
#   - src/     (source files)
#   - include/ (header files)
#   - test/    (unit tests)
# ============================================================================

# ============================================================================
# MONITOR SETTINGS
# ============================================================================
# Auto-enter bootloader on upload
monitor_filters = esp32_exception_decoder
monitor_echo = no
monitor_eol = LF

# ============================================================================
# ADVANCED SETTINGS
# ============================================================================
# Custom partition table: app0=1.875MB at 0x10000 (standard), NVS=64KB, no OTA
# NOTE: Changing partition layout requires full flash erase: pio run -t erase
board_build.partitions = partitions.csv

# Flash settings
board_build.flash_size = 4MB
board_build.flash_freq = 80m
board_build.flash_mode = dio

# Embed TLS certificates for HTTPS (FEAT-016)
board_build.embed_txtfiles =
  certs/servercert.pem
  certs/prvtkey.pem

# Verbose output for debugging med de hw counter som er i spil, de tæller tilsyndeladene ikke præsigt
# build_type = debug

# ============================================================================
# Eletechsup ES32D26 IO Board (ESP32-WROVER med 4 MB PSRAM, 38-pin)
# 8DO/8DI/8AI/2AO + RS485 + W5500 Ethernet
# ESP32-WROVER-modulet erstatter original WROOM-32 — PSRAM aktiveret nedenfor.
# Se docs/ES32D26_BOARD_GUIDE.md for komplet pin-mapping og tilslutning
# ============================================================================
[env:es32d26]
platform = espressif32
board = esp-wrover-kit
framework = arduino
monitor_speed = 115200
upload_speed = 460800
upload_before_reset = default_reset
upload_wait_for_upload_port = yes

extra_scripts = pre:scripts/generate_build_info.py

# Serial port: auto-detect (følger VS Code port-valg)
# monitor_port = COM13
# upload_port = COM13

build_flags =
  -DBOARD_ES32D26
  -DETHERNET_W5500_ENABLED
  # ESP32-WROVER PSRAM (4 MB) — aktiverer heap_caps MALLOC_CAP_SPIRAM
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  # FLASH OPTIMERING (v7.9.7.3) — Link Time Optimization + dead code elimination
  # -flto inliner på tværs af translation units; -ffunction-sections +
  # -fdata-sections + -Wl,--gc-sections fjerner ubrugte funktioner/data.
  # Typisk besparelse: 5-15% flash.
  -Os
  -flto
  -ffunction-sections
  -fdata-sections
  -Wl,--gc-sections
  # Reducer debug-log verbosity: WARNING (2) i stedet for INFO (3) — sparer
  # format-strings for INFO-kald i Arduino/ESP-IDF. debug_println()/
  # debug_printf() (eget layer) er ikke ramt.
  -DCORE_DEBUG_LEVEL=CORE_DEBUG_LEVEL_WARNING
  -DLOG_LOCAL_LEVEL=ESP_LOG_WARN
  -Wall
  -Wextra
  -std=c99
  -DESP32
  -DARDUINOJSON_ENABLE_NAN=0
  -DARDUINOJSON_ENABLE_INFINITY=0
  -DARDUINOJSON_ENABLE_COMMENTS=0
  -DARDUINOJSON_ENABLE_PROGMEM=0
  # FEAT-031: OTA rollback support
  -DCONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE=1

build_unflags =
  # Sikrer at LTO ikke disables af en default PlatformIO/Arduino konfig
  -fno-lto

lib_deps =
  bblanchon/ArduinoJson@^7.0.0

monitor_filters = esp32_exception_decoder
monitor_echo = no
monitor_eol = LF

board_build.partitions = partitions.csv
board_build.flash_size = 4MB
board_build.flash_freq = 80m
board_build.flash_mode = dio
# WROVER PSRAM aktiveret (4 MB SPI PSRAM @ 40 MHz)
board_build.arduino.memory_type = qio_qspi
board_upload.flash_size = 4MB

board_build.embed_txtfiles =
  certs/servercert.pem
  certs/prvtkey.pem
